name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: markdown
    attributes:
      value: |
        ### Before reporting

        Please check the following:

        - Does the MCP server connect? (e.g. `connected` in Claude Code's `/mcp`)
        - Do tool calls succeed? (the agent can call a tool like `getProjects`)

        If it fails at either step, the error is often surfaced on the agent side
        that launches the MCP server — not by mcp-testrail itself.
        Please find the error/log there and paste it in **Actual Behavior** below.

        - Claude Code: https://docs.claude.com/en/docs/claude-code/troubleshooting
        - Cursor: https://cursor.com/en-US/docs/mcp
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure MCP server with ...
        2. Call tool '...' with parameters ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      description: Version of mcp-testrail you are using.
      placeholder: e.g. 0.19.1
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`.
      placeholder: e.g. v22.14.0
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
